<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 77ABC</title>
    <style>
        body { background: #0d1b1e; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #162a2d; padding: 30px; border-radius: 15px; border: 1px solid #ffd700; width: 80%; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #ffd700; color: black; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .logo { font-size: 30px; color: #ffd700; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">77ABC</div>
        <input type="text" id="user" placeholder="ইউজারনেম">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <!-- লগইন করলে home.html এ নিয়ে যাবে -->
        <button onclick="location.href='home.html'">লগইন করুন</button>
    </div>
</body>
</html>
