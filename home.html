<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - 77ABC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1b1e; color: white; font-family: sans-serif; padding-bottom: 70px; }
        header { background: #162a2d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffd700; }
        .balance { background: #000; padding: 5px 12px; border-radius: 15px; border: 1px solid #ffd700; font-size: 14px; }
        
        .categories { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #162a2d; }
        .cat { padding: 8px 15px; background: #244044; border-radius: 5px; font-size: 13px; white-space: nowrap; }
        .active { background: #00a8a8; color: white; }

        .game-section { padding: 15px; }
        .section-title { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-item { background: #1c3539; border-radius: 10px; overflow: hidden; text-align: center; border: 1px solid #2d4d52; cursor: pointer; }
        .game-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #333; }
        .game-item p { font-size: 11px; padding: 5px; color: #ddd; }

        /* বটম মেনু */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #162a2d; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2d4d52; }
        .nav-item { text-align: center; font-size: 11px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: #ffd700;">☰ 77ABC</div>
    <div class="balance">৳ ১০০.০০ ↻</div>
</header>

<div class="categories">
    <div class="cat active">হোম</div>
    <div class="cat">পছন্দ</div>
    <div class="cat">স্লট</div>
    <div class="cat">ফিশিং</div>
    <div class="cat">লাইভ</div>
</div>

<div class="game-section">
    <div class="section-title">🎰 সাম্প্রতিক খেলা</div>
    <div class="game-grid">
        <div class="game-item" onclick="location.href='slot1.html'">
            <img src="https://via.placeholder.com/150/ff0000?text=Super+Ace" alt="Game">
            <p>Super Ace</p>
        </div>
        <div class="game-item" onclick="alert('গেমটি শীঘ্রই আসছে!')">
            <img src="https://via.placeholder.com/150/0000ff?text=Aviator" alt="Game">
            <p>Aviator</p>
        </div>
        <div class="game-item" onclick="alert('গেমটি শীঘ্রই আসছে!')">
            <img src="https://via.placeholder.com/150/ffff00?text=Fortune" alt="Game">
            <p>Fortune Gems</p>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item">🏠<br>হোম</a>
    <a href="#" class="nav-item">🎁<br>প্রমোশন</a>
    <a href="#" class="nav-item" style="color: #ffd700;">💰<br>ডিপোজিট</a>
    <a href="#" class="nav-item">👤<br>সদস্য</a>
</nav>

</body>
</html>
